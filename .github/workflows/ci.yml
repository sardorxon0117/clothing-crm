name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-check:
    runs-on: ubuntu-latest

    steps:
      - name: Kodni olish
        uses: actions/checkout@v4

      - name: Node.js o'rnatish
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Paketlarni o'rnatish
        run: npm install

      - name: Sintaksisni tekshirish
        run: |
          node --check server.js
          node --check db.js
          node --check s3.js
          node --check create-admin.js
          for f in routes/*.js middleware/*.js; do node --check "$f"; done

      - name: Tekshiruv yakunlandi
        run: echo "✅ Barcha tekshiruvlar muvaffaqiyatli o'tdi"